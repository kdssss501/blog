# Cloudflare Pages 配置
# 生产环境使用 D1 数据库实现数据持久化

# D1 数据库绑定
# 部署前需要先创建 D1 数据库：
#   npx wrangler d1 create kdssss-blog-db
# 然后将返回的 database_id 填入下方

[[d1_databases]]
binding = "DB"
database_name = "kdssss-blog-db"
database_id = "YOUR_D1_DATABASE_ID_HERE"

# D1 初始化 SQL（首次部署时执行）：
#   npx wrangler d1 execute kdssss-blog-db --remote --file=./functions/_d1_init.sql
