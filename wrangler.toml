name = "my-blog"
compatibility_date = "2026-05-07" # 更为今日
main = "src/worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"
# 与 Astro trailingSlash: "always" 对齐
html_handling = "force-trailing-slash"
# 未匹配路由时返回 dist/404.html（status 404）
not_found_handling = "404-page"

[vars]
NODE_VERSION = "22"
# 敏感信息请在 Cloudflare Dashboard → Workers & Pages →
# 你的 Worker → Settings → Variables and Secrets 中添加 Secret：
# AI_API_KEY
# UMAMI_TOKEN
# 可选变量：
# ALLOWED_ORIGINS = "https://your-domain.example"

[[kv_namespaces]]
binding = "VISITOR_KV"
id = "2720087758cb476eb24fd8dd4efb3e4c"

[[vectorize]]
binding = "VECTORIZE"
index_name = "blog-ai-search"

[ai]
binding = "AI"
